name: Documentation
description: Report a docs issue or propose a documentation improvement.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: dropdown
    id: doc_area
    attributes:
      label: Documentation area
      options:
        - README
        - Getting started
        - Architecture
        - Contributing
        - Security / support
        - Other
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you already know the better wording or structure, include it here.
