name: Bug report
description: Report a reproducible problem in the bot, Mini App, deployment flow, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it reliably.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where does the problem happen?
      options:
        - Telegram bot
        - Telegram Mini App
        - Cloudflare deployment
        - AI manager
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the actual behavior.
      placeholder: The cart badge does not update after adding an item from the Mini App.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1. Open the Mini App
        2. Add any product to the cart
        3. Observe the badge state
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, Telegram client, OS, or runtime version if relevant.
      placeholder: Telegram iOS 11.x on iPhone 13, or Chromium 123 on Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      render: shell
